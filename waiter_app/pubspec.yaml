name: waiter_app
description: App de Garçom - Comanda Digital para o sistema de delivery completo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  
  # Payment - Mercado Pago
  mercadopago_sdk: ^2.1.0
  http: ^1.1.0
  
  # UI & Widgets
  fluttertoast: ^8.2.4
  provider: ^6.1.1
  intl: ^0.18.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  table_calendar: ^3.0.9
  
  # Utils
  image_picker: ^1.0.5
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  uuid: ^4.2.2
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: Signatra
      fonts:
        - asset: assets/fonts/Signatra.ttf
